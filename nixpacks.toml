# Railway: force Python provider for the FastAPI backend.
# Without this, nixpacks picks Node.js because of package.json in the root.
providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-8010}"
