# Railway: force Python provider for the FastAPI backend.
# Without this, nixpacks picks Node.js because of package.json in the root.
providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "python312Packages.pip", "gcc"]

[phases.install]
cmds = ["python3 -m pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && python3 -m uvicorn server:app --host 0.0.0.0 --port ${PORT:-8010}"
